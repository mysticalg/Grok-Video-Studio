name: Build Android Play Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  schedule:
    - cron: '0 3 * * *'
  release:
    types:
      - published
  workflow_run:
    workflows:
      - Auto Bump Version and Tag
    types:
      - completed

permissions:
  contents: write

jobs:
  detect-daily-changes:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Check for commits in the last 24 hours
        id: check
        run: |
          BRANCH="${{ github.event.repository.default_branch }}"
          COUNT="$(git rev-list --count --since='24 hours ago' "origin/$BRANCH")"

          if [ "$COUNT" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    needs: detect-daily-changes
    if: always() && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') && (github.event_name != 'schedule' || needs.detect-daily-changes.outputs.has_changes == 'true')
    runs-on: ubuntu-latest
    env:
      HAS_ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        run: |
          RELEASE_TAG=""
          SHOULD_RELEASE="false"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            SHOULD_RELEASE="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            SHOULD_RELEASE="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            VERSION="$(tr -d '[:space:]' < VERSION)"
            if [[ -n "$VERSION" ]]; then
              RELEASE_TAG="v$VERSION"
              SHOULD_RELEASE="true"
            fi
          fi

          # Keep the output contract explicit so later steps can decide
          # whether to upload release assets for signed and unsigned builds.
          {
            echo "release_tag=$RELEASE_TAG"
            echo "should_release=$SHOULD_RELEASE"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build unsigned release bundle
        run: gradle -p android bundleRelease

      - name: Resolve Play bundle paths
        id: bundle
        run: |
          set -euo pipefail
          SOURCE_BUNDLE="android/app/build/outputs/bundle/release/app-release.aab"
          RELEASE_BUNDLE="android/app/build/outputs/bundle/release/GrokVideoDesktopStudio-android-play.aab"

          if [ ! -f "$SOURCE_BUNDLE" ]; then
            echo "::error::Expected bundle not found at $SOURCE_BUNDLE"
            exit 1
          fi

          cp "$SOURCE_BUNDLE" "$RELEASE_BUNDLE"
          echo "release_bundle=$RELEASE_BUNDLE" >> "$GITHUB_OUTPUT"

      - name: Validate signing configuration
        env:
          ANDROID_SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          provided=0
          missing=0

          for name in ANDROID_SIGNING_KEY_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -n "${!name:-}" ]; then
              provided=$((provided + 1))
            else
              missing=$((missing + 1))
            fi
          done

          if [ "$provided" -gt 0 ] && [ "$missing" -gt 0 ]; then
            echo "::error::Android signing secrets are partially configured. Configure all 4 secrets, or leave all unset to publish an unsigned artifact."
            exit 1
          fi

      - name: Decode signing keystore
        if: env.HAS_ANDROID_SIGNING_KEY == 'true'
        env:
          ANDROID_SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_SIGNING_KEY_BASE64" | base64 --decode > android/release.keystore

      - name: Sign Play bundle (.aab)
        if: env.HAS_ANDROID_SIGNING_KEY == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          jarsigner \
            -keystore android/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "${{ steps.bundle.outputs.release_bundle }}" \
            "$KEY_ALIAS"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrokVideoDesktopStudio-android-play-aab
          path: ${{ steps.bundle.outputs.release_bundle }}

      - name: Publish release asset
        if: steps.meta.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          files: ${{ steps.bundle.outputs.release_bundle }}

      - name: Explain unsigned build
        if: env.HAS_ANDROID_SIGNING_KEY != 'true'
        run: |
          echo "ANDROID_SIGNING_KEY_BASE64 is not configured. Uploaded unsigned .aab artifact and attached it to the release when applicable."
