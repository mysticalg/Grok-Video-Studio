name: Build Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  schedule:
    - cron: '0 3 * * *'
  release:
    types:
      - published
  workflow_run:
    workflows:
      - Auto Bump Version and Tag
    types:
      - completed

permissions:
  contents: write

jobs:
  detect-daily-changes:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Check for commits in the last 24 hours
        id: check
        run: |
          BRANCH="${{ github.event.repository.default_branch }}"
          COUNT="$(git rev-list --count --since='24 hours ago' "origin/$BRANCH")"

          if [ "$COUNT" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    needs: detect-daily-changes
    if: always() && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') && (github.event_name != 'schedule' || needs.detect-daily-changes.outputs.has_changes == 'true')
    runs-on: ubuntu-latest
    env:
      HAS_ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 != '' }}
      HAS_GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        run: |
          RELEASE_TAG=""
          SHOULD_RELEASE="false"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            SHOULD_RELEASE="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
            SHOULD_RELEASE="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            RELEASE_TAG="$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
              | python -c "import json,sys; print((json.load(sys.stdin).get('tag_name') or '').strip())")"
            if [[ "$RELEASE_TAG" == v* ]]; then
              SHOULD_RELEASE="true"
            else
              VERSION="$(tr -d '[:space:]' < VERSION)"
              if [[ -n "$VERSION" ]]; then
                RELEASE_TAG="v$VERSION"
                SHOULD_RELEASE="true"
              fi
            fi
          fi

          # Keep the output contract explicit so later steps can decide
          # whether to upload release assets for signed and unsigned builds.
          {
            echo "release_tag=$RELEASE_TAG"
            echo "should_release=$SHOULD_RELEASE"
          } >> "$GITHUB_OUTPUT"

      - name: Detect Android project layout
        id: android
        run: |
          # Guard Android-specific steps so this workflow still passes on branches
          # where the Android project has not been generated yet.
          if [ -d android ] && { [ -f android/settings.gradle ] || [ -f android/settings.gradle.kts ]; }; then
            echo "has_android_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_android_project=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping Android bundle build because ./android is missing or incomplete."
          fi

      - name: Resolve Android version metadata
        if: steps.android.outputs.has_android_project == 'true'
        id: version
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          set -euo pipefail

          VERSION_NAME=""
          if [ -f VERSION ]; then
            VERSION_NAME="$(tr -d '[:space:]' < VERSION)"
          fi

          if [ -z "$VERSION_NAME" ] && [ -n "$RELEASE_TAG" ]; then
            VERSION_NAME="${RELEASE_TAG#v}"
          fi

          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="0.0.0-dev"
          fi

          VERSION_CODE=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))
          RELEASE_NAME="v$VERSION_NAME"

          {
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
            echo "release_name=$RELEASE_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Google Play publish config
        if: steps.android.outputs.has_android_project == 'true'
        id: play
        env:
          GOOGLE_PLAY_PACKAGE_NAME: ${{ vars.GOOGLE_PLAY_PACKAGE_NAME }}
          GOOGLE_PLAY_TRACK: ${{ vars.GOOGLE_PLAY_TRACK }}
          GOOGLE_PLAY_RELEASE_STATUS: ${{ vars.GOOGLE_PLAY_RELEASE_STATUS }}
        run: |
          set -euo pipefail

          PACKAGE_NAME="${GOOGLE_PLAY_PACKAGE_NAME:-com.grokvideostudio.app}"
          TRACK="${GOOGLE_PLAY_TRACK:-internal}"
          STATUS="${GOOGLE_PLAY_RELEASE_STATUS:-completed}"

          {
            echo "package_name=$PACKAGE_NAME"
            echo "track=$TRACK"
            echo "status=$STATUS"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Java
        if: steps.android.outputs.has_android_project == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        if: steps.android.outputs.has_android_project == 'true'
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        if: steps.android.outputs.has_android_project == 'true'
        uses: gradle/actions/setup-gradle@v3

      - name: Validate signing configuration
        if: steps.android.outputs.has_android_project == 'true'
        env:
          ANDROID_SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          provided=0
          missing=0

          for name in ANDROID_SIGNING_KEY_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -n "${!name:-}" ]; then
              provided=$((provided + 1))
            else
              missing=$((missing + 1))
            fi
          done

          if [ "$provided" -gt 0 ] && [ "$missing" -gt 0 ]; then
            echo "::error::Android signing secrets are partially configured. Configure all 4 secrets, or leave all unset to publish an unsigned artifact."
            exit 1
          fi

      - name: Prepare Gradle signing config
        if: steps.android.outputs.has_android_project == 'true' && env.HAS_ANDROID_SIGNING_KEY == 'true'
        env:
          ANDROID_SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$ANDROID_SIGNING_KEY_BASE64" | base64 --decode > android/release.keystore
          cat > android/release-keystore.properties <<PROPS
          storeFile=release.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          PROPS

      - name: Build release bundle and APK
        if: steps.android.outputs.has_android_project == 'true'
        env:
          ANDROID_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          gradle -p android \
            bundleRelease \
            assembleRelease \
            "-PandroidVersionName=$ANDROID_VERSION_NAME" \
            "-PandroidVersionCode=$ANDROID_VERSION_CODE"

      - name: Resolve Android artifact paths
        if: steps.android.outputs.has_android_project == 'true'
        id: artifacts
        run: |
          set -euo pipefail
          SOURCE_BUNDLE="android/app/build/outputs/bundle/release/app-release.aab"
          RELEASE_BUNDLE="android/app/build/outputs/bundle/release/GrokVideoDesktopStudio-android-play.aab"
          SIGNED_APK="android/app/build/outputs/apk/release/app-release.apk"
          UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"

          if [ ! -f "$SOURCE_BUNDLE" ]; then
            echo "::error::Expected bundle not found at $SOURCE_BUNDLE"
            exit 1
          fi

          if [ -f "$SIGNED_APK" ]; then
            SOURCE_APK="$SIGNED_APK"
            RELEASE_APK="android/app/build/outputs/apk/release/GrokVideoDesktopStudio-android-release.apk"
          elif [ -f "$UNSIGNED_APK" ]; then
            SOURCE_APK="$UNSIGNED_APK"
            RELEASE_APK="android/app/build/outputs/apk/release/GrokVideoDesktopStudio-android-release-unsigned.apk"
          else
            echo "::error::Expected release APK not found at $SIGNED_APK or $UNSIGNED_APK"
            exit 1
          fi

          cp "$SOURCE_BUNDLE" "$RELEASE_BUNDLE"
          cp "$SOURCE_APK" "$RELEASE_APK"
          echo "release_bundle=$RELEASE_BUNDLE" >> "$GITHUB_OUTPUT"
          echo "release_apk=$RELEASE_APK" >> "$GITHUB_OUTPUT"

      - name: Validate bundle structure
        if: steps.android.outputs.has_android_project == 'true'
        run: |
          set -euo pipefail
          BUNDLETOOL_VERSION="1.17.2"

          ensure_bundletool() {
            if [ ! -f /tmp/bundletool.jar ]; then
              curl -fsSL "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar" -o /tmp/bundletool.jar
            fi
          }

          has_bundle_config() {
            local archive="$1"
            unzip -Z1 "$archive" | tr -d '\r' | tee /tmp/aab-contents.txt >/dev/null
            grep -Fxq "BundleConfig.pb" /tmp/aab-contents.txt || grep -Fxq "./BundleConfig.pb" /tmp/aab-contents.txt
          }

          # Keep this preflight lightweight and non-opinionated: verify the artifact is a readable
          # zip before we run bundletool's canonical validation.
          unzip -t "${{ steps.artifacts.outputs.release_bundle }}"
          unzip -Z1 "${{ steps.artifacts.outputs.release_bundle }}" | tr -d '\r' | tee /tmp/aab-contents.txt >/dev/null

          # Bundletool/Play requires a root-level BundleConfig.pb. If it is missing, recover deterministically.
          if ! has_bundle_config "${{ steps.artifacts.outputs.release_bundle }}"; then
            echo "BundleConfig.pb missing in release bundle; attempting deterministic recovery from Gradle outputs..."

            RECOVERY_CONFIG=""

            # Prefer the source bundle first (in case a post-process step ever mutates RELEASE_BUNDLE).
            if unzip -p "android/app/build/outputs/bundle/release/app-release.aab" BundleConfig.pb > /tmp/BundleConfig.pb 2>/dev/null; then
              RECOVERY_CONFIG="/tmp/BundleConfig.pb"
            elif unzip -p "android/app/build/outputs/bundle/release/app-release.aab" ./BundleConfig.pb > /tmp/BundleConfig.pb 2>/dev/null; then
              RECOVERY_CONFIG="/tmp/BundleConfig.pb"
            elif unzip -p "android/app/build/outputs/bundle/release/app-release.aab" BUNDLE-METADATA/com.android.tools.build.bundletool/BundleConfig.pb > /tmp/BundleConfig.pb 2>/dev/null; then
              RECOVERY_CONFIG="/tmp/BundleConfig.pb"
            else
              # Fall back to any BundleConfig.pb emitted by AGP intermediates.
              RECOVERY_CONFIG="$(find android/app/build -type f -name BundleConfig.pb | head -n 1 || true)"
            fi

            if [ -n "$RECOVERY_CONFIG" ] && [ -f "$RECOVERY_CONFIG" ]; then
              echo "Recovered BundleConfig.pb from: $RECOVERY_CONFIG"
              tmp_dir="$(mktemp -d)"
              cp "$RECOVERY_CONFIG" "$tmp_dir/BundleConfig.pb"
              (
                cd "$tmp_dir"
                # Reinsert as a root-level entry so Google Play and bundletool recognize it.
                zip -q "$GITHUB_WORKSPACE/${{ steps.artifacts.outputs.release_bundle }}" BundleConfig.pb
              )
              rm -rf "$tmp_dir"
            else
              # Some environments occasionally surface a module zip (base/...) instead of a full .aab.
              # Rebuild a canonical App Bundle from that module archive with bundletool.
              if grep -Fxq "base/manifest/AndroidManifest.xml" /tmp/aab-contents.txt && grep -Fxq "base/resources.pb" /tmp/aab-contents.txt; then
                echo "Detected module archive layout; rebuilding canonical .aab with bundletool build-bundle..."
                ensure_bundletool
                java -jar /tmp/bundletool.jar build-bundle \
                  --modules="${{ steps.artifacts.outputs.release_bundle }}" \
                  --output="${{ steps.artifacts.outputs.release_bundle }}.repacked"
                mv "${{ steps.artifacts.outputs.release_bundle }}.repacked" "${{ steps.artifacts.outputs.release_bundle }}"
              else
                echo "::error::BundleConfig.pb is missing from ${{ steps.artifacts.outputs.release_bundle }} and no recovery source was found"
                echo "::group::AAB entries"
                cat /tmp/aab-contents.txt
                echo "::endgroup::"
                exit 1
              fi
            fi

            if ! has_bundle_config "${{ steps.artifacts.outputs.release_bundle }}"; then
              echo "::error::BundleConfig.pb recovery ran but the entry is still missing from ${{ steps.artifacts.outputs.release_bundle }}"
              echo "::group::AAB entries"
              cat /tmp/aab-contents.txt
              echo "::endgroup::"
              exit 1
            fi
          fi

      - name: Validate with bundletool
        if: steps.android.outputs.has_android_project == 'true'
        run: |
          set -euo pipefail
          BUNDLETOOL_VERSION="1.17.2"
          curl -fsSL "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar" -o /tmp/bundletool.jar
          java -jar /tmp/bundletool.jar validate --bundle="${{ steps.artifacts.outputs.release_bundle }}"

      - name: Upload AAB artifact
        if: steps.android.outputs.has_android_project == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: GrokVideoDesktopStudio-android-play-aab
          path: ${{ steps.artifacts.outputs.release_bundle }}

      - name: Upload APK artifact
        if: steps.android.outputs.has_android_project == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: GrokVideoDesktopStudio-android-apk
          path: ${{ steps.artifacts.outputs.release_apk }}

      - name: Publish release asset
        if: steps.android.outputs.has_android_project == 'true' && steps.meta.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          files: |
            ${{ steps.artifacts.outputs.release_bundle }}
            ${{ steps.artifacts.outputs.release_apk }}

      - name: Publish to Google Play
        if: steps.android.outputs.has_android_project == 'true' && steps.meta.outputs.should_release == 'true' && env.HAS_ANDROID_SIGNING_KEY == 'true' && env.HAS_GOOGLE_PLAY_SERVICE_ACCOUNT == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ steps.play.outputs.package_name }}
          releaseFiles: ${{ steps.artifacts.outputs.release_bundle }}
          tracks: ${{ steps.play.outputs.track }}
          status: ${{ steps.play.outputs.status }}
          releaseName: ${{ steps.version.outputs.release_name }}

      - name: Explain unsigned build
        if: steps.android.outputs.has_android_project == 'true' && env.HAS_ANDROID_SIGNING_KEY != 'true'
        run: |
          echo "ANDROID_SIGNING_KEY_BASE64 is not configured. Uploaded an unsigned Gradle-produced .aab and APK artifact, and attached them to the release when applicable."

      - name: Explain skipped Google Play publish
        if: steps.android.outputs.has_android_project == 'true' && steps.meta.outputs.should_release == 'true' && (env.HAS_ANDROID_SIGNING_KEY != 'true' || env.HAS_GOOGLE_PLAY_SERVICE_ACCOUNT != 'true')
        run: |
          if [ "${HAS_ANDROID_SIGNING_KEY}" != "true" ]; then
            echo "Skipping Google Play publish because a signed Android release build is required."
          fi

          if [ "${HAS_GOOGLE_PLAY_SERVICE_ACCOUNT}" != "true" ]; then
            echo "Skipping Google Play publish because GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is not configured."
          fi
